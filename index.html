<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kuality Produtos Químicos - Mais de 35 anos de experiência em produtos químicos industriais. Qualidade e eficiência garantidas." />
    <meta name="theme-color" content="#0D1117" />
    <title>Kuality Produtos Químicos | Quem entende, busca Kuality</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body { margin: 0; background: #0D1117; }
      .loader { position: fixed; inset: 0; background: #0D1117; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
      .loader.hidden { opacity: 0; pointer-events: none; }
      .loader-spinner { width: 50px; height: 50px; border: 3px solid #161B22; border-top-color: #00F0FF; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loader" class="loader">
      <div class="loader-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500) })
    </script>
  </body>
</html>
