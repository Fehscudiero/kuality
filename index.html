    <style>

    <div id="loader" class="loader" aria-hidden="true">

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Script do Loader Original
      window.addEventListener("load", () => {
        setTimeout(() => {
          const loader = document.getElementById("loader");
          if (loader) loader.classList.add("hidden");
        }, 500);
      });

      // NOVA MICRO-INTERAÇÃO: Efeito Alternado Seguro
      const originalTitle = document.title;
      let titleInterval;
      
      // Frases de impacto técnico e industrial (sem emojis)
      const alertFrames = [
        "[ PROTOCOLO EM ESPERA ]",
        "Retorne para a Kuality",
      ];
      let frameIndex = 0;

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          // O usuário saiu: Aplica a primeira frase e inicia o loop de 1 segundo
          document.title = alertFrames[0];
          titleInterval = setInterval(() => {
            frameIndex = (frameIndex + 1) % alertFrames.length;
            document.title = alertFrames[frameIndex];
          }, 1000);
        } else {
          // O usuário voltou: Mata o processo instantaneamente e zera as variáveis
          clearInterval(titleInterval);
          document.title = originalTitle;
          frameIndex = 0;
        }
      });
    </script>
  </body>
